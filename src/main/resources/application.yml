spring:
  application:
    name: resume-coach-agent
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/resume_coach}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    time-zone: Asia/Shanghai
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.deepseek.com}
      chat:
        enabled: ${APP_AI_ENABLED:false}
        options:
          model: ${OPENAI_MODEL:deepseek-chat}
          temperature: ${OPENAI_TEMPERATURE:0.3}

server:
  port: ${SERVER_PORT:8080}

app:
  ai:
    enabled: ${APP_AI_ENABLED:false}
  rag:
    context:
      max-chars: ${RAG_CONTEXT_MAX_CHARS:1600}
      fallback-per-segment-chars: ${RAG_CONTEXT_FALLBACK_SEGMENT_CHARS:220}
    embedding:
      fallback-dim: ${RAG_EMBEDDING_FALLBACK_DIM:128}
    retrieval:
      fusion-strategy: ${RAG_RETRIEVAL_FUSION_STRATEGY:RRF}
      keyword-weight: ${RAG_RETRIEVAL_KEYWORD_WEIGHT:0.30}
      fts-weight: ${RAG_RETRIEVAL_FTS_WEIGHT:0.35}
      vector-weight: ${RAG_RETRIEVAL_VECTOR_WEIGHT:0.35}
      min-top-k: ${RAG_RETRIEVAL_MIN_TOPK:3}
      max-top-k: ${RAG_RETRIEVAL_MAX_TOPK:8}
      default-top-k: ${RAG_RETRIEVAL_DEFAULT_TOPK:4}
      vector-min-score: ${RAG_RETRIEVAL_VECTOR_MIN_SCORE:0.25}
    guardrail:
      enabled: ${RAG_GUARDRAIL_ENABLED:true}
      min-evidence-overlap: ${RAG_GUARDRAIL_MIN_EVIDENCE_OVERLAP:0.18}
      no-evidence-refuse: ${RAG_GUARDRAIL_NO_EVIDENCE_REFUSE:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info
