version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: resume-coach-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: resume_coach
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d resume_coach"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:

